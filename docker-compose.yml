# Infraestrutura de desenvolvimento do Bil
# Sobe os serviços de apoio: banco de dados, cache e observabilidade (Prometheus/Grafana).
# Backend e frontend rodam localmente via pnpm/npm, fora do Docker.

services:
  postgres:
    container_name: bil-postgres
    image: postgres:17
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: bil
      PGDATA: /data/postgres
    volumes:
      - ./data/pg:/data/postgres

  redis:
    container_name: bil-redis
    image: redis:7-alpine
    ports:
      - 6379:6379
    volumes:
      - ./data/redis:/data

  prometheus:
    container_name: bil-prometheus
    image: prom/prometheus:v2.55.1
    ports:
      - 9090:9090
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus

  grafana:
    container_name: bil-grafana
    image: grafana/grafana:11.3.0
    ports:
      - 3000:3000
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - ./data/grafana:/var/lib/grafana
    depends_on:
      - prometheus
